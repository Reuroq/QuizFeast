services:
  - type: web
    name: quizfeast
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    disk:
      name: forms-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_HOST
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
